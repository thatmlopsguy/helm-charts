apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-portainer
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - merge:
       generators:
        - clusters:
            values:
              addonChart: portainer
              addonChartVersion: 1.0.69
              addonChartRepository: https://portainer.github.io/k8s
              addonChartNamespace: portainer
          selector:
            matchExpressions:
              - key: enable_portainer
                operator: In
                values: ['true']
        - clusters:
            selector:
              matchLabels:
                environment: dev
            values:
              addonChartVersion: 1.12.0
        - clusters:
            selector:
              matchLabels:
                environment: prod
            values:
              addonChartVersion: 1.12.0
      mergeKeys:
      - server
  template:
    metadata:
      name: 'addon-{{name}}-{{values.addonChart}}'
    spec:
      project: infra-addons
      sources:
        - repoURL: '{{metadata.annotations.addons_repo_url}}'
          targetRevision: '{{metadata.annotations.addons_repo_revision}}'
          ref: values
        - chart: '{{values.addonChart}}'
          repoURL: '{{values.addonChartRepository}}'
          targetRevision: '{{values.addonChartVersion}}'
          helm:
            releaseName: '{{values.addonChart}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/environments/default/addons/{{values.addonChart}}/values.yaml
              - $values/environments/{{metadata.labels.environment}}/addons/{{values.addonChart}}/values.yaml
              - $values/clusters/{{name}}/addons/{{values.addonChart}}/values.yaml
      destination:
        name: '{{name}}'
        namespace: '{{values.addonChartNamespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
