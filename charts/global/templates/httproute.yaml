{{/*
Helpers for resolving port numbers
*/}}
{{- define "resolvePort" -}}
{{- $deployment := .deployment }}
{{- $portName := .portName }}
{{- if $deployment.ports }}
  {{- range $deployment.ports }}
    {{- if eq .name $portName }}
{{ .containerPort }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}

{{- define "resolveDefaultPort" -}}
{{- $deployment := .deployment }}
{{- if $deployment.ports }}
  {{- $firstPort := index $deployment.ports 0 }}
{{ $firstPort.containerPort }}
{{- else }}
8080
{{- end }}
{{- end }}
