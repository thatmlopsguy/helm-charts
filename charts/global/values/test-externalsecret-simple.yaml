deployments:
  api:
    enabled: true
    image:
      repository: myapp/api
      tag: latest
    externalSecret:
      enabled: true
      secretStoreRef:
        name: vault-store
        kind: SecretStore
      target:
        name: api-secrets
      data:
        - secretKey: db_password
          remoteRef:
            key: secret/api
            property: password

externalSecrets:
  enabled: true
  secrets:
    shared-config:
      secretStoreRef:
        name: aws-store
        kind: ClusterSecretStore
      target:
        name: shared-secrets
      dataFrom:
        - extract:
            key: myapp/shared
