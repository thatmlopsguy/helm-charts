# Test values for simple ArgoCD Rollout canary deployment
deployments:
  backend:
    enabled: true
    replicaCount: 3
    image:
      repository: nginx
      tag: "1.21"
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 80
        protocol: TCP
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

    # Simple canary rollout configuration
    rollout:
      enabled: true
      revisionHistoryLimit: 5
      progressDeadlineSeconds: 600
      strategy:
        type: canary
        canary:
          maxSurge: 1
          maxUnavailable: 0
          steps:
            - setWeight: 20
            - pause:
                duration: 30s
            - setWeight: 50
            - pause:
                duration: 60s
            - setWeight: 80
            - pause:
                duration: 30s
          scaleDownDelaySeconds: 300
