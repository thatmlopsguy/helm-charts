# Test values for advanced ArgoCD Rollout with analysis and traffic routing
deployments:
  api:
    enabled: true
    replicaCount: 5
    image:
      repository: myapp/api
      tag: "v2.1.0"
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
      - name: metrics
        containerPort: 9090
        protocol: TCP
    env:
      - name: LOG_LEVEL
        value: "info"
      - name: METRICS_ENABLED
        value: "true"
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi

    # Advanced canary rollout with analysis and traffic routing
    rollout:
      enabled: true
      annotations:
        rollout.argoproj.io/description: "API canary deployment with analysis"
      labels:
        rollout-type: "canary"
        environment: "production"
      revisionHistoryLimit: 10
      progressDeadlineSeconds: 1200
      strategy:
        type: canary
        canary:
          maxSurge: 2
          maxUnavailable: 0
          steps:
            - setWeight: 10
            - pause:
                duration: 60s
            - setWeight: 25
            - analysis:
                templates:
                  - templateName: success-rate
                  - templateName: latency-p99
                args:
                  - name: service-name
                    value: "api"
                  - name: namespace
                    value: "production"
            - setWeight: 50
            - pause:
                duration: 300s
            - analysis:
                templates:
                  - templateName: success-rate
                  - templateName: latency-p99
                  - templateName: error-rate
                args:
                  - name: service-name
                    value: "api"
                  - name: namespace
                    value: "production"
            - setWeight: 75
            - pause:
                duration: 180s
          analysis:
            templates:
              - templateName: success-rate
              - templateName: latency-p99
            args:
              - name: service-name
                value: "api"
              - name: prometheus-server
                valueFrom:
                  secretKeyRef:
                    name: prometheus-config
                    key: server-url
            startingStep: 2
          trafficRouting:
            nginx:
              stableIngress: api-stable
              annotationPrefix: nginx.ingress.kubernetes.io
              additionalIngressAnnotations:
                canary-by-header: "X-Canary-Deploy"
                canary-by-header-value: "true"
          scaleDownDelaySeconds: 600
          abortScaleDownDelaySeconds: 30

  # Blue-Green deployment example
  frontend:
    enabled: true
    replicaCount: 3
    image:
      repository: myapp/frontend
      tag: "v1.5.0"
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 3000
        protocol: TCP
    env:
      - name: NODE_ENV
        value: "production"
      - name: API_URL
        value: "http://api:8080"
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

    # Blue-Green deployment strategy
    rollout:
      enabled: true
      annotations:
        rollout.argoproj.io/description: "Frontend blue-green deployment"
      labels:
        rollout-type: "blue-green"
        environment: "production"
      revisionHistoryLimit: 5
      progressDeadlineSeconds: 900
      strategy:
        type: blueGreen
        blueGreen:
          activeService: frontend-active
          previewService: frontend-preview
          autoPromotionEnabled: false
          scaleDownDelaySeconds: 300
          prePromotionAnalysis:
            templates:
              - templateName: success-rate
              - templateName: load-test
            args:
              - name: service-name
                value: "frontend"
              - name: test-duration
                value: "5m"
          postPromotionAnalysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: "frontend"
              - name: monitoring-duration
                value: "10m"
          previewReplicaCount: 2
          antiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: frontend
                  topologyKey: kubernetes.io/hostname
