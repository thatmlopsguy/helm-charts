# Advanced test values file for StatefulSet template
# This demonstrates multiple StatefulSets with different configurations

nameOverride: "advanced-statefulset"

# Multiple StatefulSets configuration
statefulsets:
  # Redis cluster example
  redis:
    enabled: true
    replicaCount: 3
    image:
      repository: redis
      tag: "7-alpine"
      pullPolicy: IfNotPresent

    serviceName: "redis-headless"
    podManagementPolicy: "Parallel"

    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        partition: 0

    ports:
      - name: redis
        containerPort: 6379
        protocol: TCP

    command:
      - redis-server
      - /etc/redis/redis.conf

    env:
      - name: REDIS_REPLICATION_MODE
        value: "master"

    volumeMounts:
      - name: redis-data
        mountPath: /data
      - name: redis-config
        mountPath: /etc/redis

    volumes:
      - name: redis-config
        configMap:
          name: redis-config

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

    volumeClaimTemplates:
      - metadata:
          name: redis-data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    livenessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      exec:
        command:
          - redis-cli
          - ping
      initialDelaySeconds: 5
      periodSeconds: 5

  # Elasticsearch example (disabled by default)
  elasticsearch:
    enabled: false
    replicaCount: 3
    image:
      repository: elasticsearch
      tag: "8.8.0"
      pullPolicy: IfNotPresent

    serviceName: "elasticsearch-headless"

    ports:
      - name: http
        containerPort: 9200
        protocol: TCP
      - name: transport
        containerPort: 9300
        protocol: TCP

    env:
      - name: cluster.name
        value: "elasticsearch-cluster"
      - name: node.name
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: discovery.seed_hosts
        value: "elasticsearch-headless"
      - name: cluster.initial_master_nodes
        value: "advanced-statefulset-elasticsearch-0,advanced-statefulset-elasticsearch-1,advanced-statefulset-elasticsearch-2"
      - name: ES_JAVA_OPTS
        value: "-Xms512m -Xmx512m"

    volumeMounts:
      - name: elasticsearch-data
        mountPath: /usr/share/elasticsearch/data

    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

    volumeClaimTemplates:
      - metadata:
          name: elasticsearch-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "fast-ssd"
          resources:
            requests:
              storage: 20Gi

    # Custom security context
    securityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true

    # Pod annotations
    podAnnotations:
      co.elastic.logs/enabled: "true"

    # Node affinity for spreading across availability zones
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                - elasticsearch
            topologyKey: kubernetes.io/hostname
